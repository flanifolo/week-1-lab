<!DOCTUPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Week 1 Lab</title>  
    <style>
        body {
           background-color: #e4e4e4;
            margin: 0;
            padding: 0;
        }
        #container, h1, footer {
            margin: 20px;
            Width: 97%;
            background-color: ;
            text-align: center;
        }
        .animations {
            margin: 20px;
            padding: 16px;
            border: 1px solid gray;
            border-radius: 15px;
            text-align: center;

        }
        .transitions {
            margin: 20px;
            padding: 16px;
            border: 1px solid gray;
            border-radius: 15px;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>Animation & Transition Demonstrations</h1>
    <div class="animations">
    <div> 
        <h2>CSS Animation 1</h2>
        <img id="a1" src="images/a1.png" alt="animated image">
    </div>
    <div>
        <h2>CSS Animation 2</h2>
        <img id="a2" src="images/a2.png" alt="animated image">
    </div>
    <div>
        <h2>CSS Animation 3</h2>
        <img id="a3" src="images/a3.png" alt="animated image">
    </div>
  </div>
    <style>
        img {
        width: 50px;            
    }
    </style>
     <div class="transitions">
        <div>
            <h2>CSS Transition 1</h2>
            <img id="t1" src="images/a1.png" alt="transitioned image">
        </div>
        <div>
            <h2>CSS Transition 2</h2>
            <img id="t2" src="images/a2.png" alt="transitioned image">
        </div>
        <div>
            <h2>CSS Transition 3</h2>
            <img id="t3" src="images/a3.png" alt="transitioned image">
        </div>
    </div>
    <style>
        #a1 { animation: move1 5s 3; }
        @keyframes move1 {
            0% { transform: translateX(0px); }
            50% { transform: translateX(300px); }
            100% { transform: translateX(0px); }
        }
        #a2 { animation: move2 5s 5; }
        @keyframes move2 {
            0% { transform: translateX(0px) rotate(0deg); }
            50% { transform: translateX(500px) rotate(360deg); }
            100% { transform: translateX(0px) rotate(0deg); }
        }
        #a3 { animation: move3 10s 5; }
        @keyframes move3 {
            0% { transform: translateX(0px) rotate(0deg); }
            25% { transform: translateX(500px) rotate(360deg); }
            50% { transform: translateX(0px) rotate(0deg); }
            75% { transform: translateX(-500px) rotate(-360deg); }
            100% { transform: translateX(0px) rotate(0deg); }
        }
    </style>
    <style>
        #tl { transition: transform 1s; }
            #t1:hover {
                cursor: pointer;
                transform: rotateX(145deg);
            }
         #t2 { transition: transform 1s; }
            #t2:hover {
                cursor: pointer;
                transform: rotateZ(225deg) scale(.8);
            }
         #t3 { transition: transform 0.5s;
      }
      	 #t3:hover {
            cursor: pointer;
            transform: rotateY(145deg) scale(1.1);
        }
    </style>
    <footer>Copyright 2026</footer>
</body>
</html>
